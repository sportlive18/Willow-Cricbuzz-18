<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportLink - Willow Cricbuzz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(10,10,10,0.98);
            padding: 0 40px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 3px solid #e8000d;
            box-shadow: 0 4px 30px rgba(232,0,13,0.3);
            height: 70px;
        }
        .logo-container { display: flex; align-items: center; gap: 6px; }
        .logo-sport { font-size: 30px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .logo-link  { font-size: 30px; font-weight: 900; color: #e8000d; text-transform: uppercase; letter-spacing: 1px; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .live-badge {
            background: #e8000d; padding: 7px 18px; border-radius: 4px;
            font-size: 13px; font-weight: 700; letter-spacing: 2px;
            animation: glow 2s infinite;
            display: flex; align-items: center; gap: 7px;
        }
        .live-dot-header { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes glow {
            0%,100%{ box-shadow: 0 0 10px rgba(232,0,13,.5); }
            50%    { box-shadow: 0 0 25px rgba(232,0,13,.9); }
        }
        @keyframes pulse {
            0%,100%{ opacity:1; transform:scale(1);   }
            50%    { opacity:.4; transform:scale(1.4); }
        }
        .sub-header {
            background: linear-gradient(90deg,#e8000d,#b30000);
            padding: 10px 40px; display: flex; align-items: center; gap: 14px;
        }
        .cricket-icon { font-size: 20px; }
        .sub-title { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; }
        .sub-divider { width: 1px; height: 16px; background: rgba(255,255,255,.4); }
        .sub-desc { font-size: 13px; color: rgba(255,255,255,.85); letter-spacing: 1px; }
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .video-section {
            background: rgba(255,255,255,.04); border-radius: 14px; overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,.8);
            border: 1px solid rgba(232,0,13,.25);
        }
        .video-header {
            background: rgba(0,0,0,.6); padding: 16px 28px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(232,0,13,.2);
        }
        .video-title-group { display: flex; flex-direction: column; gap: 4px; }
        .video-title { font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .video-subtitle { font-size: 13px; color: rgba(255,255,255,.55); letter-spacing: 1px; }
        .live-indicator {
            display: flex; align-items: center; gap: 9px;
            background: rgba(232,0,13,.15); padding: 8px 18px; border-radius: 6px;
            border: 1px solid rgba(232,0,13,.5);
        }
        .live-dot { width: 10px; height: 10px; background: #e8000d; border-radius: 50%; animation: pulse 1.5s infinite; box-shadow: 0 0 8px #e8000d; }
        .live-text { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #e8000d; }

        /* ── VIDEO WRAPPER ── */
        .player-shell {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
        }
        .player-shell iframe {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            border: none; display: block;
        }

        /* ── WATERMARK BLOCKER — gradient fade, no black box ── */
        .logo-block {
            position: absolute;
            top: 0;
            right: 0;
            width: 220px;
            height: 80px;
            /* Fade from transparent on the left to opaque on the right,
               matching the dark video edge so it's invisible to viewers */
            background: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.92) 40%, #000 100%);
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 10px 12px 0 0;
        }

        /* SportLink brand label inside the blocker */
        .block-brand {
            display: flex;
            align-items: center;
            gap: 3px;
            opacity: 0.55;
        }
        .block-brand-sport { font-size: 12px; font-weight: 800; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
        .block-brand-link  { font-size: 12px; font-weight: 800; color: #e8000d; letter-spacing: 1px; text-transform: uppercase; }

        /* SportLink watermark — bottom right, subtle */
        .sportlink-watermark {
            position: absolute;
            bottom: 80px;
            right: 20px;
            z-index: 15;
            pointer-events: none;
            opacity: 0.35;
            transition: opacity 0.3s;
        }
        .watermark-text {
            font-size: 14px; font-weight: 700; letter-spacing: 1px; color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            display: flex; align-items: center; gap: 3px;
        }
        .watermark-sport { color: #fff; }
        .watermark-link  { color: #e8000d; }

        /* Desktop fullscreen — keep branding, hide blocker */
        .player-shell:fullscreen .logo-block,
        .player-shell:-webkit-full-screen .logo-block,
        .player-shell:-moz-full-screen .logo-block,
        .player-shell:-ms-fullscreen .logo-block { display: none; }

        .player-shell:fullscreen .sportlink-watermark,
        .player-shell:-webkit-full-screen .sportlink-watermark,
        .player-shell:-moz-full-screen .sportlink-watermark,
        .player-shell:-ms-fullscreen .sportlink-watermark {
            opacity: 0.5; bottom: 20px;
        }

        /* Mobile landscape */
        @media screen and (orientation: landscape) and (max-width: 1024px) {
            .logo-block { width: 280px; height: 100px; }
            .sportlink-watermark { bottom: 15px; right: 15px; opacity: 0.45; }
            .watermark-text { font-size: 13px; }
        }
        @media screen and (orientation: landscape) and (max-height: 500px) {
            .logo-block { width: 25%; height: 25%; min-width: 200px; min-height: 80px; }
        }

        .controls {
            padding: 18px 28px; background: rgba(0,0,0,.5);
            display: flex; gap: 12px; align-items: center;
            border-top: 1px solid rgba(255,255,255,.06);
        }
        .btn { padding:10px 22px; border:none; border-radius:6px; font-size:13px; font-weight:700; cursor:pointer; transition:all .25s; color:#fff; text-transform:uppercase; letter-spacing:1px; }
        .btn-primary  { background:#e8000d; box-shadow:0 4px 15px rgba(232,0,13,.35); }
        .btn-primary:hover  { background:#ff1a24; box-shadow:0 6px 20px rgba(232,0,13,.55); transform:translateY(-2px); }
        .btn-secondary{ background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); }
        .btn-secondary:hover{ background:rgba(255,255,255,.18); transform:translateY(-2px); }
        .spacer { flex:1; }
        .stream-info { font-size:12px; color:rgba(255,255,255,.4); letter-spacing:1px; }
        .footer { text-align:center; padding:30px 20px; color:rgba(255,255,255,.25); font-size:12px; letter-spacing:1px; }
        .footer span { color:#e8000d; }

        @media(max-width:768px){
            .header,.sub-header{ padding-left:16px; padding-right:16px; }
            .logo-sport,.logo-link{ font-size:22px; }
            .sub-desc,.sub-divider{ display:none; }
            .container{ margin:16px auto; padding:0 12px; }
            .controls{ flex-wrap:wrap; padding:14px 16px; gap:10px; }
            .btn{ padding:9px 16px; font-size:12px; }
            .stream-info{ display:none; }
            .logo-block{ width:180px; height:70px; }
            .sportlink-watermark{ bottom: 70px; right: 10px; }
            .watermark-text{ font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-container">
        <span class="logo-sport">Sport</span><span class="logo-link">Link</span>
    </div>
    <div class="header-right">
        <div class="live-badge"><div class="live-dot-header"></div>LIVE</div>
    </div>
</div>

<div class="sub-header">
    <span class="cricket-icon">🏏</span>
    <span class="sub-title">Willow Cricbuzz</span>
    <div class="sub-divider"></div>
    <span class="sub-desc">Live Cricket Streaming</span>
</div>

<div class="container">
    <div class="video-section">

        <div class="video-header">
            <div class="video-title-group">
                <div class="video-title">Willow Cricbuzz</div>
                <div class="video-subtitle">Live Cricket · HD Stream</div>
            </div>
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span class="live-text">LIVE</span>
            </div>
        </div>

        <div class="player-shell" id="playerShell">
            <iframe
                id="streamFrame"
                src= "https://sportlink-willow-cricbuzz-10.pages.dev/"
                allowfullscreen
                allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
                scrolling="no"
                frameborder="0">
            </iframe>

            <!-- Gradient blocker — no black box, fades naturally into the video edge -->
            <div class="logo-block" id="logoBlock">
                <div class="block-brand">
                    <span class="block-brand-sport">Sport</span><span class="block-brand-link">Link</span>
                </div>
            </div>

            <!-- Bottom-right SportLink watermark -->
            <div class="sportlink-watermark">
                <div class="watermark-text">
                    <span class="watermark-sport">Sport</span><span class="watermark-link">Link</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary"   onclick="enterFullscreen()">⛶ &nbsp;Fullscreen</button>
            <button class="btn btn-secondary" onclick="reloadStream()">↺ &nbsp;Reload</button>
            <div class="spacer"></div>
            <div class="stream-info">sportlink.live · willow cricbuzz</div>
        </div>

    </div>
</div>

<div class="footer">&copy; 2026 <span>SportLink by Sayan</span> &nbsp;·&nbsp; Willow Cricbuzz &nbsp;·&nbsp; All rights reserved</div>

<script>
    function reloadStream(){
        const f = document.getElementById('streamFrame');
        f.src = f.src;
    }

    function enterFullscreen(){
        const w = document.getElementById('playerShell');
        const f = document.getElementById('streamFrame');
        const go = el => (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen||function(){}).call(el);
        go(w) || go(f);
    }

    window.addEventListener('orientationchange', () => setTimeout(adjustBlockerSize, 100));
    window.addEventListener('resize', adjustBlockerSize);

    function adjustBlockerSize() {
        const blocker = document.getElementById('logoBlock');
        const isLandscape = window.innerWidth > window.innerHeight;
        const isMobile = window.innerWidth <= 1024;
        if (isLandscape && isMobile) {
            blocker.style.width  = '280px';
            blocker.style.height = '100px';
        } else {
            blocker.style.width  = '';
            blocker.style.height = '';
        }
    }

    adjustBlockerSize();

    document.getElementById('playerShell').addEventListener('click', () => { setTimeout(enterFullscreen, 300); }, { once: true });
</script>
</body>
</html>
