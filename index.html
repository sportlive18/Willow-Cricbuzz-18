<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportLink - Willow Cricbuzz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(10,10,10,0.98);
            padding: 0 40px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 3px solid #e8000d;
            box-shadow: 0 4px 30px rgba(232,0,13,0.3);
            height: 70px;
        }
        .logo-container { display: flex; align-items: center; gap: 6px; }
        .logo-sport { font-size: 30px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .logo-link  { font-size: 30px; font-weight: 900; color: #e8000d; text-transform: uppercase; letter-spacing: 1px; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .live-badge {
            background: #e8000d; padding: 7px 18px; border-radius: 4px;
            font-size: 13px; font-weight: 700; letter-spacing: 2px;
            animation: glow 2s infinite;
            display: flex; align-items: center; gap: 7px;
        }
        .live-dot-header { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes glow {
            0%,100%{ box-shadow: 0 0 10px rgba(232,0,13,.5); }
            50%    { box-shadow: 0 0 25px rgba(232,0,13,.9); }
        }
        @keyframes pulse {
            0%,100%{ opacity:1; transform:scale(1);   }
            50%    { opacity:.4; transform:scale(1.4); }
        }
        .sub-header {
            background: linear-gradient(90deg,#e8000d,#b30000);
            padding: 10px 40px; display: flex; align-items: center; gap: 14px;
        }
        .cricket-icon { font-size: 20px; }
        .sub-title { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; }
        .sub-divider { width: 1px; height: 16px; background: rgba(255,255,255,.4); }
        .sub-desc { font-size: 13px; color: rgba(255,255,255,.85); letter-spacing: 1px; }
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .video-section {
            background: rgba(255,255,255,.04); border-radius: 14px; overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,.8);
            border: 1px solid rgba(232,0,13,.25);
        }
        .video-header {
            background: rgba(0,0,0,.6); padding: 16px 28px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(232,0,13,.2);
        }
        .video-title-group { display: flex; flex-direction: column; gap: 4px; }
        .video-title { font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .video-subtitle { font-size: 13px; color: rgba(255,255,255,.55); letter-spacing: 1px; }
        .live-indicator {
            display: flex; align-items: center; gap: 9px;
            background: rgba(232,0,13,.15); padding: 8px 18px; border-radius: 6px;
            border: 1px solid rgba(232,0,13,.5);
        }
        .live-dot { width: 10px; height: 10px; background: #e8000d; border-radius: 50%; animation: pulse 1.5s infinite; box-shadow: 0 0 8px #e8000d; }
        .live-text { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #e8000d; }

        /* ── VIDEO WRAPPER ── */
        .player-shell {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
        }
        .player-shell iframe {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            border: none; display: block;
        }

        /* Opaque block that sits OVER the iframe to cover the watermark */
        .logo-block {
            position: absolute;
            top: 0; right: 0;
            width: 220px;          /* wide enough to hide the watermark */
            height: 80px;
            background: #000;      /* solid black cover */
            z-index: 10;
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 10px;
            pointer-events: none;
        }
        .logo-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e8000d;
            box-shadow: 0 0 20px rgba(232,0,13,.8), 0 0 6px #000;
        }

        .controls {
            padding: 18px 28px; background: rgba(0,0,0,.5);
            display: flex; gap: 12px; align-items: center;
            border-top: 1px solid rgba(255,255,255,.06);
        }
        .btn { padding:10px 22px; border:none; border-radius:6px; font-size:13px; font-weight:700; cursor:pointer; transition:all .25s; color:#fff; text-transform:uppercase; letter-spacing:1px; }
        .btn-primary  { background:#e8000d; box-shadow:0 4px 15px rgba(232,0,13,.35); }
        .btn-primary:hover  { background:#ff1a24; box-shadow:0 6px 20px rgba(232,0,13,.55); transform:translateY(-2px); }
        .btn-secondary{ background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); }
        .btn-secondary:hover{ background:rgba(255,255,255,.18); transform:translateY(-2px); }
        .spacer { flex:1; }
        .stream-info { font-size:12px; color:rgba(255,255,255,.4); letter-spacing:1px; }
        .footer { text-align:center; padding:30px 20px; color:rgba(255,255,255,.25); font-size:12px; letter-spacing:1px; }
        .footer span { color:#e8000d; }

        @media(max-width:768px){
            .header,.sub-header{ padding-left:16px; padding-right:16px; }
            .logo-sport,.logo-link{ font-size:22px; }
            .sub-desc,.sub-divider{ display:none; }
            .container{ margin:16px auto; padding:0 12px; }
            .controls{ flex-wrap:wrap; padding:14px 16px; gap:10px; }
            .btn{ padding:9px 16px; font-size:12px; }
            .stream-info{ display:none; }
            .logo-block{ width:160px; height:60px; }
            .logo-img{ width:110px; height:110px; }
        }
    </style>
</head>

<script>
    function reloadStream(){
        const f = document.getElementById('streamFrame');
        f.src = f.src;
    }
    function enterFullscreen(){
        const w = document.getElementById('playerShell');
        const f = document.getElementById('streamFrame');
        const go = el => (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen||function(){}).call(el);
        go(w) || go(f);
    }
    document.getElementById('playerShell').addEventListener('click', ()=>{ setTimeout(enterFullscreen,300); }, {once:true});
</script>
